<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <!-- website title -->
        <div id="website-title">Bulletin Board!</div>

        <div id="loading-animation" style="display: none;">
            test
        </div>


        <!-- loader animation -->
        <div id="loader" style="display: none;">
            <div class="lds-ellipsis">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>



        <!-- this is where posts will populate -->
        <div id="posts">
        </div>


        <!-- form where users can enter text and their name to post on the bulletin board -->
        <form id="form">
            <textarea type="text" id="text-input" placeholder="Enter what you want to post..."></textarea>
            <input type="text" id="name-input" placeholder="Enter your name...">
            <button type="submit" id="submit">Submit</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
